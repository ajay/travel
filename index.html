<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="description" content="A static, read-only world travel map." />
  <title>Atlas — My World Travel Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --ocean:#0a0f1e; --surface:#111827; --panel:#1a2235; --border:#2a3a55;
      --text:#e8eaf0; --text-muted:#8896b3;
      --visited:#22c55e; --wishlist:#f59e0b; --planned:#3b82f6;
      --hover:#4a90d9; --accent:#e8c97a;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
    html { background:#111827; height:100%; height:100dvh; }
    body { font-family:'DM Sans',sans-serif; background:var(--ocean); color:var(--text); height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

    /* HEADER */
    header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; padding-top:calc(12px + env(safe-area-inset-top)); background:rgba(17,24,39,.97); border-bottom:1px solid var(--border); z-index:100; flex-shrink:0; min-width:0; overflow:hidden; gap:8px; }
    .logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--accent); letter-spacing:.04em; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .logo span { color:var(--text-muted); font-weight:400; font-size:.8rem; margin-left:8px; font-family:'DM Sans',sans-serif; }
    .stats-bar { display:flex; gap:12px; flex-shrink:1; min-width:0; }
    .stat { text-align:center; }
    .stat-num { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:600; line-height:1; }
    .stat-num.v{color:var(--visited)} .stat-num.p{color:var(--planned)} .stat-num.w{color:var(--wishlist)}
    .stat-label { font-size:.62rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }
    .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; min-width:0; }
    .legend { display:flex; gap:8px; align-items:center; flex-shrink:1; min-width:0; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:.73rem; color:var(--text-muted); }
    .legend-dot { width:9px; height:9px; border-radius:50%; }
    .stats-toggle-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; background:var(--panel); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:.8rem; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .stats-toggle-btn:hover { color:var(--accent); border-color:var(--accent); }
    .stats-toggle-btn.active { color:var(--accent); border-color:var(--accent); background:rgba(232,201,122,.08); }

    /* MAP */
    .map-container { flex:1; position:relative; overflow:hidden; min-height:0; }

    #map-svg { width:100%; height:100%; cursor:grab; }
    #map-svg:active { cursor:grabbing; }
    .country { stroke:#1e2d45; stroke-width:.5px; fill:#1e3a5f; transition:fill .15s; cursor:pointer; }
    .country:hover { fill:var(--hover); stroke:#6ab0f5; stroke-width:1px; }
    .country.selected { fill:var(--hover); stroke:#6ab0f5; stroke-width:1px; }
    .country.visited.selected { fill:#4ade80; stroke:#6ab0f5; stroke-width:1px; }
    .country.planned.selected { fill:#60a5fa; stroke:#6ab0f5; stroke-width:1px; }
    .country.wishlist.selected { fill:#fbbf24; stroke:#6ab0f5; stroke-width:1px; }
    .country.visited { fill:var(--visited); } .country.visited:hover { fill:#4ade80; }
    .country.planned { fill:var(--planned); } .country.planned:hover { fill:#60a5fa; }
    .country.wishlist { fill:var(--wishlist); } .country.wishlist:hover { fill:#fbbf24; }

    /* INFO PANEL */
    .info-panel { position:absolute; top:16px; right:16px; width:290px; background:rgba(15,21,36,.98); border:1px solid var(--border); border-radius:14px; padding:20px; transform:translateX(320px); transition:transform .35s cubic-bezier(.34,1.2,.64,1); z-index:50; backdrop-filter:blur(12px); max-height:calc(100vh - 100px); overflow-y:auto; }
    .info-panel.open { transform:translateX(0); }
    .panel-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.1rem; padding:3px 7px; border-radius:4px; transition:color .2s; }
    .panel-close:hover { color:var(--text); }
    .country-flag { font-size:2.8rem; line-height:1; margin-bottom:8px; }
    .country-name { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:600; margin-bottom:3px; }
    .country-region { font-size:.75rem; color:var(--text-muted); margin-bottom:16px; text-transform:uppercase; letter-spacing:.06em; }
    .data-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .data-cell { background:var(--panel); border-radius:8px; padding:9px 11px; }
    .data-cell.full { grid-column:1/-1; }
    .data-cell-label { font-size:.62rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
    .data-cell-value { font-size:.85rem; font-weight:500; }
    .my-status-pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:500; letter-spacing:.04em; }
    .my-status-pill.visited  { background:rgba(34,197,94,.15);  color:var(--visited);  border:1px solid var(--visited); }
    .my-status-pill.planned  { background:rgba(59,130,246,.15); color:var(--planned);  border:1px solid var(--planned); }
    .my-status-pill.wishlist { background:rgba(245,158,11,.15); color:var(--wishlist); border:1px solid var(--wishlist); }
    .my-rating { color:#f59e0b; font-size:1rem; letter-spacing:2px; }
    .my-rating .dim { color:#2a3a55; }
    .my-notes { font-size:.85rem; color:var(--text); line-height:1.55; white-space:pre-wrap; }

    /* STATS PANEL */
    .stats-panel { position:absolute; top:16px; left:16px; width:300px; background:rgba(15,21,36,.98); border:1px solid var(--border); border-radius:14px; padding:22px; transform:translateX(-330px); transition:transform .35s cubic-bezier(.34,1.2,.64,1); z-index:50; backdrop-filter:blur(12px); max-height:calc(100vh - 100px); overflow-y:auto; }
    .stats-panel.open { transform:translateX(0); }

    .sp-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:600; color:var(--accent); margin-bottom:18px; display:flex; align-items:center; gap:8px; }

    /* World % ring */
    .world-ring-wrap { display:flex; align-items:center; gap:18px; margin-bottom:22px; padding:16px; background:var(--panel); border-radius:12px; }
    .ring-svg { flex-shrink:0; }
    .ring-bg { fill:none; stroke:#2a3a55; stroke-width:8; }
    .ring-fill { fill:none; stroke:var(--visited); stroke-width:8; stroke-linecap:round; transition:stroke-dasharray 1s ease; transform:rotate(-90deg); transform-origin:50% 50%; }
    .ring-text-wrap { flex:1; }
    .ring-pct { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--visited); line-height:1; }
    .ring-pct span { font-size:1rem; color:var(--text-muted); }
    .ring-label { font-size:.75rem; color:var(--text-muted); margin-top:4px; }
    .ring-sub { font-size:.7rem; color:var(--text-muted); margin-top:2px; }

    /* Continent bars */
    .continent-section { margin-bottom:20px; }
    .section-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); margin-bottom:10px; }
    .continent-row { margin-bottom:10px; }
    .cont-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
    .cont-name { font-size:.82rem; }
    .cont-count { font-size:.75rem; color:var(--text-muted); }
    .cont-bar-bg { height:5px; background:#1e2d45; border-radius:3px; overflow:hidden; }
    .cont-bar-fill { height:100%; border-radius:3px; transition:width 1s ease; }

    /* Badges */
    .badges-section { }
    .badges-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .badge { padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--panel); text-align:center; transition:all .3s; }
    .badge.earned { border-color:var(--accent); background:rgba(232,201,122,.08); }
    .badge-icon { font-size:1.5rem; margin-bottom:4px; filter:grayscale(1) opacity(.35); transition:filter .3s; }
    .badge.earned .badge-icon { filter:none; }
    .badge-name { font-size:.68rem; color:var(--text-muted); line-height:1.3; transition:color .3s; }
    .badge.earned .badge-name { color:var(--accent); }

    /* TOOLTIP */
    #tooltip { position:absolute; background:rgba(17,24,39,.95); border:1px solid var(--border); padding:6px 11px; border-radius:8px; font-size:.78rem; pointer-events:none; opacity:0; transition:opacity .15s; z-index:200; white-space:nowrap; }
    #tooltip.show { opacity:1; }

    /* SEARCH */
    .search-wrap { position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:50; }
    .search-input { padding:9px 17px; background:rgba(17,24,39,.95); border:1px solid var(--border); border-radius:30px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.83rem; width:250px; outline:none; transition:border-color .2s; }
    .search-input::placeholder { color:var(--text-muted); }
    .search-input:focus { border-color:var(--accent); }
    .search-results { position:absolute; bottom:calc(100% + 8px); left:0; right:0; background:rgba(17,24,39,.98); border:1px solid var(--border); border-radius:12px; max-height:200px; overflow-y:auto; display:none; }
    .search-results.show { display:block; }
    .search-result-item { padding:8px 15px; font-size:.8rem; cursor:pointer; transition:background .15s; border-bottom:1px solid var(--border); }
    .search-result-item:last-child { border-bottom:none; }
    .search-result-item:hover { background:var(--panel); }

    /* ZOOM */
    .zoom-controls { position:absolute; bottom:22px; right:22px; display:flex; flex-direction:column; gap:4px; z-index:50; }
    .zoom-btn { width:34px; height:34px; background:rgba(17,24,39,.95); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .zoom-btn:hover { background:var(--panel); border-color:var(--accent); }

    /* LOADING */
    .loading-overlay { position:fixed; inset:0; background:var(--ocean); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:opacity .5s; }
    .loading-overlay.hidden { opacity:0; pointer-events:none; }
    .loading-logo { font-family:'Playfair Display',serif; font-size:2.5rem; color:var(--accent); letter-spacing:.06em; }
    .loading-bar { width:160px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
    .loading-fill { height:100%; background:var(--accent); width:0%; animation:loadbar 2s ease forwards; }
    @keyframes loadbar { 0%{width:0%} 60%{width:70%} 100%{width:100%} }

    /* ── PANEL DIVIDER & SECTIONS ── */
    .panel-divider { height:1px; background:var(--border); margin:14px 0; }
    .panel-section-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); margin-bottom:8px; }

    /* ── VISITED LIST VIEW ── */
    .list-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:600;
      opacity:0; pointer-events:none; transition:opacity .3s;
    }
    .list-overlay.show { opacity:1; pointer-events:all; }

    .list-panel {
      position:fixed; top:0; right:0; bottom:0; width:380px; max-width:100vw;
      background:#111827; border-left:1px solid var(--border);
      z-index:700; transform:translateX(100%);
      transition:transform .35s cubic-bezier(.32,1,.5,1);
      display:flex; flex-direction:column;
    }
    .list-panel.open { transform:translateX(0); }

    .list-header { padding:20px 20px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .list-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .list-title { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:600; color:var(--accent); }
    .list-close-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.1rem; padding:4px 8px; border-radius:6px; transition:color .2s; }
    .list-close-btn:hover { color:var(--text); }

    .list-tabs { display:flex; gap:6px; }
    .list-tab { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:none; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:.75rem; cursor:pointer; transition:all .2s; }
    .list-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(232,201,122,.08); }

    .list-search { width:100%; padding:8px 14px; background:var(--panel); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.82rem; outline:none; margin-top:10px; }
    .list-search:focus { border-color:var(--accent); }
    .list-search::placeholder { color:var(--text-muted); }

    .list-body { flex:1; overflow-y:auto; padding:10px 12px; }
    .list-empty { text-align:center; color:var(--text-muted); font-size:.85rem; padding:40px 20px; line-height:1.7; }

    .list-item { display:flex; align-items:center; gap:12px; padding:10px 10px; border-radius:10px; cursor:pointer; transition:background .15s; border-bottom:1px solid rgba(42,58,85,.4); }
    .list-item:last-child { border-bottom:none; }
    .list-item:hover { background:var(--panel); }
    .list-item-flag { font-size:1.5rem; flex-shrink:0; width:32px; text-align:center; }
    .list-item-flag img { width:28px; height:auto; border-radius:3px; }
    .list-item-info { flex:1; min-width:0; }
    .list-item-name { font-size:.88rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .list-item-sub  { font-size:.72rem; color:var(--text-muted); margin-top:1px; }
    .list-item-stars { font-size:.75rem; color:#f59e0b; flex-shrink:0; letter-spacing:1px; }
    .list-item-badge { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* List button in header */
    .list-toggle-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; background:var(--panel); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:.8rem; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .list-toggle-btn:hover { color:var(--accent); border-color:var(--accent); }
    .list-toggle-btn.active { color:var(--accent); border-color:var(--accent); background:rgba(232,201,122,.08); }

    /* Mobile list panel layout */
    @media (max-width:640px) {
      .list-panel { width:100vw; border-left:none; border-top:1px solid var(--border); border-radius:20px 20px 0 0; top:auto; height:90dvh; transform:translateY(100%); }
      .list-panel.open { transform:translateY(0); }
    }

    /* export button */
    .export-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; background:var(--panel); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:.8rem; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .export-btn:hover { color:var(--accent); border-color:var(--accent); }
    .export-btn.loading { opacity:.6; pointer-events:none; }

    @media (max-width:640px) {
      .export-btn { display:none; }
    }

    /* ── WIKIPEDIA / COUNTRY DETAIL SECTION ── */
    .wiki-section { margin-top:4px; }
    .wiki-toggle { width:100%; padding:8px 12px; background:none; border:1px solid var(--border);
      border-radius:8px; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:.78rem;
      cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; }
    .wiki-toggle:hover { border-color:var(--accent); color:var(--accent); }
    .wiki-content { margin-top:10px; display:none; }
    .wiki-content.open { display:block; }
    .wiki-excerpt { font-size:.8rem; color:var(--text-muted); line-height:1.65;
      background:var(--panel); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
    .wiki-link { display:inline-flex; align-items:center; gap:5px; font-size:.75rem;
      color:var(--accent); text-decoration:none; opacity:.8; }
    .wiki-link:hover { opacity:1; }
    .wiki-loading { font-size:.78rem; color:var(--text-muted); padding:8px 0; text-align:center; }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 860px) {
      /* Hide legend on tablets to prevent overflow */
      .legend { display:none; }
    }
    @media (max-width: 640px) {
      header { padding:10px 16px; padding-top:calc(10px + env(safe-area-inset-top)); justify-content:space-between; background:rgba(17,24,39,.97); }
      .logo span { display:none; }
      .legend { display:none; }
      .stats-toggle-btn { display:none; }
      .header-right { display:none; }
      .stats-bar { gap:18px; }
      .stat-num { font-size:1.2rem; }
      .stat-label { font-size:.6rem; }

      .zoom-controls { display:none; }

      .search-input { width:200px; font-size:.8rem; }

      #tooltip { display:none; }
      .search-input { font-size:16px; }

      .info-panel  { display:none !important; }
      .stats-panel { display:none !important; }
    }

    /* ── BOTTOM SHEET (mobile only) ── */
    .bottom-sheet-overlay {
      display:none;
      position:fixed; inset:0;
      background:rgba(0,0,0,.5);
      z-index:300;
      opacity:0;
      transition:opacity .3s;
    }
    .bottom-sheet-overlay.show { opacity:1; }

    .bottom-sheet {
      display:none;
      position:fixed;
      bottom:0; left:0; right:0;
      background:#111827;
      border-radius:20px 20px 0 0;
      border-top:1px solid var(--border);
      z-index:400;
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.32,1,.5,1);
      padding-bottom:env(safe-area-inset-bottom);
      max-height:90dvh;
      overflow-y:auto;
    }
    .bottom-sheet.open { transform:translateY(0); }

    .bs-handle-wrap { display:flex; justify-content:center; padding:12px 0 4px; flex-shrink:0; }
    .bs-handle { width:36px; height:4px; background:var(--border); border-radius:2px; }

    .bs-content { padding:0 20px 24px; }

    .bs-flag { font-size:3rem; line-height:1; margin-bottom:6px; }
    .bs-name { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; margin-bottom:2px; }
    .bs-region { font-size:.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:18px; }

    .bs-data-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
    .bs-data-cell { background:var(--panel); border-radius:10px; padding:10px 12px; }
    .bs-data-cell.full { grid-column:1/-1; }
    .bs-data-label { font-size:.62rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
    .bs-data-value { font-size:.88rem; font-weight:500; }

    /* ── STATS BOTTOM SHEET ── */
    .stats-bottom-sheet {
      display:none;
      position:fixed;
      bottom:0; left:0; right:0;
      background:#111827;
      border-radius:20px 20px 0 0;
      border-top:1px solid var(--border);
      z-index:400;
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.32,1,.5,1);
      padding-bottom:env(safe-area-inset-bottom);
      max-height:90dvh;
      overflow-y:auto;
    }
    .stats-bottom-sheet.open { transform:translateY(0); }

    /* ── MOBILE NAV BAR ── */
    .mobile-nav {
      display:none;
      position:fixed;
      bottom:0; left:0; right:0;
      height:calc(56px + env(safe-area-inset-bottom));
      padding-bottom:env(safe-area-inset-bottom);
      background:rgba(17,24,39,.97);
      border-top:1px solid var(--border);
      z-index:200;
      flex-direction:row;
      align-items:center;
      justify-content:space-around;
      padding-top:4px;
      backdrop-filter:blur(12px);
    }
    .mobile-nav-btn {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      background:none; border:none; color:var(--text-muted);
      font-family:'DM Sans',sans-serif; font-size:.62rem;
      cursor:pointer; padding:6px 20px; border-radius:10px;
      transition:color .2s; flex:1;
    }
    .mobile-nav-btn.active { color:var(--accent); }
    .mobile-nav-btn svg { flex-shrink:0; }

    @media (max-width: 640px) {
      .mobile-nav { display:flex; }
      .search-wrap { bottom:calc(72px + env(safe-area-inset-bottom)); }
    }
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  </style>

  <script>
  (function(){
    try {
      const c = document.createElement('canvas');
      c.width = c.height = 180;
      const ctx = c.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 180, 180);
      grad.addColorStop(0, '#0d1b3e');
      grad.addColorStop(1, '#0a0f1e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 180, 180);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#e8c97a';

async function buildMap() {
  const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  svg = d3.select('#map-svg');
  const W = svg.node().clientWidth  || window.innerWidth;
  const H = svg.node().clientHeight || (window.innerHeight - 56);
  const proj = d3.geoNaturalEarth1().scale(W / 6.3).translate([W/2, H/2]);
  const path = d3.geoPath().projection(proj);
  const g    = svg.append('g').attr('id', 'map-g');
  g.append('rect').attr('x',-9999).attr('y',-9999).attr('width',19998).attr('height',19998).attr('fill','#0d1829');
  const features = topojson.feature(world, world.objects.countries).features;
  g.selectAll('.country')
   .data(features).enter().append('path')
   .attr('class', d => cls(getCca3(d.id)))
   .attr('d', path)
   .attr('data-cca3', d => getCca3(d.id))
   .on('mousemove', function(event) {
     const info = lookup[this.getAttribute('data-cca3')];
     const tip  = document.getElementById('tooltip');
     tip.textContent = info?.name ?? '—';
     tip.style.left  = (event.offsetX + 14) + 'px';
     tip.style.top   = (event.offsetY - 30) + 'px';
     tip.classList.add('show');
   })
   .on('mouseleave', () => document.getElementById('tooltip').classList.remove('show'))
   .on('click', function(event) {
     event.stopPropagation();
     const cca3 = this.getAttribute('data-cca3');
     if (isMobile()) openBottomSheet(cca3);
     else openPanel(cca3);
   });
  g.append('path')
   .datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b))
   .attr('fill','none').attr('stroke','#1e2d45').attr('stroke-width',.5).attr('d', path);
  zoom = d3.zoom()
    .scaleExtent([1, 12])
    .translateExtent([[-W * 0.3, -H * 0.3], [W * 1.3, H * 1.3]])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
}

function getCca3(numId) {
  const m = COUNTRIES.find(c => parseInt(c.ccn3) === parseInt(numId));
  return m ? m.cca3 : String(numId);
}
function cls(cca3) { return ('country ' + (countryStatuses[cca3] || '') + (selectedCountry === cca3 ? ' selected' : '')).trim(); }
function refreshMap() {
  d3.selectAll('.country').attr('class', function() { return cls(this.getAttribute('data-cca3')); });
  updateCounts();
}
function updateCounts() {
  const v = Object.values(countryStatuses);
  document.getElementById('count-visited').textContent  = v.filter(x=>x==='visited').length;
  document.getElementById('count-planned').textContent  = v.filter(x=>x==='planned').length;
  document.getElementById('count-wishlist').textContent = v.filter(x=>x==='wishlist').length;
}

// ── STATS ─────────────────────────────────────────────
function calcStats() {
  const visitedCca3 = Object.keys(countryStatuses).filter(k => countryStatuses[k] === 'visited');
  const plannedCount = Object.values(countryStatuses).filter(v => v === 'planned').length;
  const total = visitedCca3.length;
  const byContinent = {};
  visitedCca3.forEach(cca3 => {
    const c = lookup[cca3];
    if (c) byContinent[c.region] = (byContinent[c.region] || 0) + 1;
  });
  return { total, byContinent, plannedCount };
}

function updateStats() {
  const { total, byContinent, plannedCount } = calcStats();
  const pct = Math.round((total / TOTAL_WORLD) * 100);

  const circumference = 2 * Math.PI * 28;
  const filled = (pct / 100) * circumference;
  document.getElementById('ring-fill').setAttribute('stroke-dasharray', `${filled} ${circumference}`);
  document.getElementById('ring-pct').innerHTML = `${pct}<span>%</span>`;
  document.getElementById('ring-sub').textContent = `${total} of ${TOTAL_WORLD} countries`;

  const barsEl = document.getElementById('continent-bars');
  barsEl.innerHTML = Object.entries(CONTINENT_TOTALS).map(([name, tot]) => {
    const visited = byContinent[name] || 0;
    const pctBar  = Math.round((visited / tot) * 100);
    const color   = CONTINENT_COLORS[name] || '#6b7280';
    return `<div class="continent-row">
      <div class="cont-header">
        <span class="cont-name">${name}</span>
        <span class="cont-count">${visited}/${tot}</span>
      </div>
      <div class="cont-bar-bg">
        <div class="cont-bar-fill" style="width:${pctBar}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('');

  const badgesEl = document.getElementById('badges-grid');
  badgesEl.innerHTML = BADGES.map(b => {
    const earned = b.check(total, byContinent, plannedCount);
    return `<div class="badge ${earned ? 'earned' : ''}" title="${b.desc}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');

  updateStatsMobile();
}

function updateStatsMobile() {
  const { total, byContinent, plannedCount } = calcStats();
  const pct = Math.round((total / TOTAL_WORLD) * 100);
  const circumference = 2 * Math.PI * 28;
  const filled = (pct / 100) * circumference;

  const ringM = document.getElementById('ring-fill-m');
  if (ringM) ringM.setAttribute('stroke-dasharray', `${filled} ${circumference}`);
  const pctM = document.getElementById('ring-pct-m');
  if (pctM) pctM.innerHTML = `${pct}<span>%</span>`;
  const subM = document.getElementById('ring-sub-m');
  if (subM) subM.textContent = `${total} of ${TOTAL_WORLD} countries`;

  const barsM = document.getElementById('continent-bars-m');
  if (barsM) barsM.innerHTML = Object.entries(CONTINENT_TOTALS).map(([name, tot]) => {
    const visited = byContinent[name] || 0;
    const pctBar  = Math.round((visited / tot) * 100);
    const color   = CONTINENT_COLORS[name] || '#6b7280';
    return `<div class="continent-row">
      <div class="cont-header"><span class="cont-name">${name}</span><span class="cont-count">${visited}/${tot}</span></div>
      <div class="cont-bar-bg"><div class="cont-bar-fill" style="width:${pctBar}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  const badgesM = document.getElementById('badges-grid-m');
  if (badgesM) badgesM.innerHTML = BADGES.map(b => {
    const earned = b.check(total, byContinent, plannedCount);
    return `<div class="badge ${earned ? 'earned' : ''}" title="${b.desc}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
}

// ── PERSONAL DATA RENDERING (read-only) ───────────────
const STATUS_LABEL = { visited:'Visited', planned:'Planned', wishlist:'Wishlist' };
function renderMyData(cca3) {
  const status = countryStatuses[cca3];
  const d = countryDetails[cca3];
  if (!status && !d) return '';
  const parts = [];
  parts.push('<div class="panel-divider"></div>');
  parts.push('<div class="panel-section-label">Your travels</div>');
  if (status) {
    parts.push(`<div style="margin-bottom:10px"><span class="my-status-pill ${status}">${STATUS_LABEL[status]||status}</span></div>`);
  }
  if (d?.rating) {
    const r = Math.max(0, Math.min(5, parseInt(d.rating)||0));
    const stars = '★'.repeat(r) + `<span class="dim">${'★'.repeat(5-r)}</span>`;
    parts.push(`<div style="margin-bottom:10px"><div class="panel-section-label">Rating</div><div class="my-rating">${stars}</div></div>`);
  }
  if (d?.year) {
    parts.push(`<div style="margin-bottom:10px"><div class="panel-section-label">Year visited</div><div class="data-cell-value">${escapeHtml(String(d.year))}</div></div>`);
  }
  if (d?.notes) {
    parts.push(`<div><div class="panel-section-label">Notes</div><div class="my-notes">${escapeHtml(d.notes)}</div></div>`);
  }
  return parts.join('');
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('search').addEventListener('input', function() {
  const val = this.value.trim();
  const res = document.getElementById('search-results');
  if (!val) { res.classList.remove('show'); return; }
  const hits = allCountries.filter(c => c.name.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  if (!hits.length) { res.classList.remove('show'); return; }
  res.innerHTML = hits.map(c => {
    const cca2 = getFlagCca2(c.cca3);
    const flagHtml = cca2
      ? `<img src="https://flagcdn.com/w40/${cca2}.png" style="width:20px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:6px" onerror="this.outerHTML='${c.flag||''}'" />`
      : `<span style="margin-right:6px">${c.flag||''}</span>`;
    return `<div class="search-result-item" data-cca3="${c.cca3}" style="display:flex;align-items:center">${flagHtml}${c.name}</div>`;
  }).join('');
  res.classList.add('show');
});
document.getElementById('search-results').addEventListener('click', e => {
  const item = e.target.closest('.search-result-item');
  if (!item) return;
  const cca3 = item.dataset.cca3;
  document.getElementById('search').value = '';
  document.getElementById('search-results').classList.remove('show');

  const el = document.querySelector(`[data-cca3="${cca3}"]`);
  if (el && zoom && svg) {
    const b = el.getBBox();
    const W = document.getElementById('map-svg').clientWidth;
    const H = document.getElementById('map-svg').clientHeight;
    svg.transition().duration(700).call(zoom.transform,
      d3.zoomIdentity.translate(W/2, H/2).scale(3).translate(-(b.x+b.width/2), -(b.y+b.height/2)));
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('#search') && !e.target.closest('#search-results'))
    document.getElementById('search-results').classList.remove('show');
});

function openList() {
  listOpen = true;
  renderList();
  document.getElementById('list-overlay').classList.add('show');
  document.getElementById('list-panel').classList.add('open');

  document.getElementById('list-toggle-btn')?.classList.remove('active');
  document.getElementById('mob-list-btn')?.classList.remove('active');

function renderList() {
  if (!listOpen) return;
  const body = document.getElementById('list-body');
  const countries = Object.keys(countryStatuses)
    .filter(cca3 => countryStatuses[cca3] === listFilter)
    .map(cca3 => ({ cca3, info: lookup[cca3], details: countryDetails[cca3] || {} }))
    .filter(x => x.info)
    .filter(x => !listSearch || x.info.name.toLowerCase().includes(listSearch))
    .sort((a,b) => a.info.name.localeCompare(b.info.name));

  if (!countries.length) {
    const labels = { visited:'visited', planned:'planned trips', wishlist:'wishlist countries' };
    body.innerHTML = `<div class="list-empty">No ${labels[listFilter]} in data.json yet.</div>`;
    return;
  }

  const statusColor = { visited:'var(--visited)', planned:'var(--planned)', wishlist:'var(--wishlist)' };
  body.innerHTML = countries.map(({ cca3, info, details }) => {
    const stars = details.rating ? '★'.repeat(details.rating) : '';
    const sub   = [details.year, details.notes].filter(Boolean).join(' · ');
    const cca2  = cca3ToCca2[cca3];
    const flagHtml = cca2
      ? `<img src="https://flagcdn.com/w40/${cca2}.png" style="width:26px;height:auto;border-radius:2px" onerror="this.outerHTML='${info.flag||''}'" />`
      : (info.flag || '');
    return `<div class="list-item" data-cca3="${cca3}">
      <div class="list-item-flag">${flagHtml}</div>
      <div class="list-item-info">
        <div class="list-item-name">${info.name}</div>
        ${sub ? `<div class="list-item-sub">${sub}</div>` : ''}
      </div>
      ${stars ? `<div class="list-item-stars">${stars}</div>` : ''}
      <div class="list-item-badge" style="background:${statusColor[listFilter]}"></div>
    </div>`;
  }).join('');

  body.querySelectorAll('.list-item').forEach(el => {
    el.addEventListener('click', () => {
      const cca3 = el.dataset.cca3;
      closeList();
      if (isMobile()) openBottomSheet(cca3);
      else openPanel(cca3);
    });
  });
}

document.querySelectorAll('.list-tab').forEach(tab => {
  tab.addEventListener('click', () => {

    tab.classList.add('active');
    listFilter = tab.dataset.filter;
    renderList();

document.getElementById('export-btn')?.addEventListener('click', async () => {
  const btn = document.getElementById('export-btn');
  btn.classList.add('loading');
  btn.textContent = 'Generating…';

  try {
    if (!window.html2canvas) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const mapEl = document.querySelector('.map-container');
    const canvas = await html2canvas(mapEl, {
      backgroundColor: '#0a0f1e',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });

    const ctx = canvas.getContext('2d');
    ctx.font = 'bold 28px serif';
    ctx.fillStyle = 'rgba(232,201,122,0.8)';
    ctx.fillText('Atlas', 24, canvas.height - 24);

    const link = document.createElement('a');
    link.download = 'atlas-travel-map.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    console.error('Export failed:', e);
    alert('Export failed. Try again or use a screenshot tool.');
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export PNG';
});

// ── WIKIPEDIA ────────────────────────────────────────
const wikiCache = {};

async function fetchWiki(countryName) {
  if (wikiCache[countryName]) return wikiCache[countryName];
  try {
    const res  = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(countryName)}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const result = {
      extract: data.extract || '',
      pageUrl: data.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(countryName)}`,
    };
    wikiCache[countryName] = result;
    return result;
  } catch(e) { return null; }
}

function renderWikiContent(containerEl, data) {
  if (!data) { containerEl.innerHTML = `<div class="wiki-excerpt" style="color:var(--text-muted);font-size:.78rem">No information available.</div>`; return; }
  const excerpt = data.extract.length > 320 ? data.extract.slice(0, 320).replace(/\s\S+$/, '') + '…' : data.extract;
  containerEl.innerHTML = `
    <div class="wiki-excerpt">${excerpt}</div>
    <a class="wiki-link" href="${data.pageUrl}" target="_blank" rel="noopener">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Read more on Wikipedia
    </a>`;
}

function attachWikiToggle(toggleId, contentId) {
  const btn = document.getElementById(toggleId);
  const box = document.getElementById(contentId);
  if (!btn || !box) return;
  let loaded = false;
  btn.addEventListener('click', async () => {
    const open = box.classList.toggle('open');
    if (open && !loaded) {
      loaded = true;
      box.innerHTML = '<div class="wiki-loading">Loading…</div>';
      const data = await fetchWiki(lookup[selectedCountry]?.name || '');
      renderWikiContent(box, data);
    }
    if (!open) { loaded = false; box.innerHTML = ''; }
  });
}

attachWikiToggle('panel-wiki-toggle', 'panel-wiki-content');
attachWikiToggle('bs-wiki-toggle', 'bs-wiki-content');

function resetWiki() {
  ['panel-wiki-content','bs-wiki-content'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('open'); el.innerHTML = ''; }
  });
}
